# Final System Domains command surface.  Install only after production
# structure and timesheet are live and their canonical domain checks pass.
#
# /etc/systemd/system/mes-pilot.service.d/62-system-domains-access-control.conf
[Service]
Environment=MES_ENABLE_SYSTEM_DOMAINS_SERVER_COMMANDS=1
Environment=MES_SYSTEM_DOMAINS_SERVER_COMMAND_SURFACES=production-structure,timesheet,access-control
