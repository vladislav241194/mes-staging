# Install only after all checks below pass:
# - GET /api/v1/system-domains/consistency returns matches:true
# - the isolated system-domains-command-e2e check is green
# - the pilot remains in PostgreSQL primary mode
#
# /etc/systemd/system/mes-pilot.service.d/50-system-domains-production-structure.conf
#
# This deliberately enables one surface only. Timesheet and access-control
# remain on their compatibility writer until they are enabled in separate
# reviewed changes.
[Service]
Environment=MES_ENABLE_SYSTEM_DOMAINS_SERVER_COMMANDS=1
Environment=MES_SYSTEM_DOMAINS_SERVER_COMMAND_SURFACES=production-structure
