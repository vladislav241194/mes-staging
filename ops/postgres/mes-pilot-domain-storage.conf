# Install only after the import and parity validation succeed.
# /etc/systemd/system/mes-pilot.service.d/40-domain-storage.conf
[Service]
EnvironmentFile=/etc/mes/mes-pilot-domain.env
# The protected environment deliberately keeps snapshot as its safe default.
# This opt-in drop-in is the only activation point after parity validation.
Environment=MES_DOMAIN_STORAGE=postgres
