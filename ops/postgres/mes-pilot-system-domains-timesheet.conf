# Apply after the production-structure surface has passed its live parity
# check and the timesheet domain suite is green.  This later drop-in replaces
# the prior surface list rather than broadening it implicitly.
#
# /etc/systemd/system/mes-pilot.service.d/61-system-domains-timesheet.conf
[Service]
Environment=MES_ENABLE_SYSTEM_DOMAINS_SERVER_COMMANDS=1
Environment=MES_SYSTEM_DOMAINS_SERVER_COMMAND_SURFACES=production-structure,timesheet
